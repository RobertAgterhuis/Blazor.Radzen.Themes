name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore (locked)
        run: |
          dotnet restore src/Agterhuis.Ui/Agterhuis.Ui.csproj --locked-mode
          dotnet restore samples/Agterhuis.Ui.Demo/Agterhuis.Ui.Demo.csproj -p:RestoreLockedMode=false
          dotnet restore tests/Agterhuis.Ui.Tests/Agterhuis.Ui.Tests.csproj --locked-mode
          dotnet restore eng/token-audit/TokenAudit.csproj --locked-mode

      - name: Build (Release)
        run: |
          dotnet build src/Agterhuis.Ui/Agterhuis.Ui.csproj -c Release --no-restore
          dotnet build samples/Agterhuis.Ui.Demo/Agterhuis.Ui.Demo.csproj -c Release --no-restore
          dotnet build tests/Agterhuis.Ui.Tests/Agterhuis.Ui.Tests.csproj -c Release --no-restore
          dotnet build eng/token-audit/TokenAudit.csproj -c Release --no-restore

      - name: Test (Release)
        run: dotnet test tests/Agterhuis.Ui.Tests/Agterhuis.Ui.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn

      - name: Pack (main only)
        if: github.ref == 'refs/heads/main'
        run: dotnet pack src/Agterhuis.Ui/Agterhuis.Ui.csproj -c Release --no-build -o artifacts/packages -p:PackageVersion=0.0.${{ github.run_number }}

      - name: Upload package artifacts (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
