name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Build (Release)
        run: dotnet build Agterhuis.Ui.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test Agterhuis.Ui.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Pack (main only)
        if: github.ref == 'refs/heads/main'
        run: dotnet pack src/Agterhuis.Ui/Agterhuis.Ui.csproj -c Release --no-build -o artifacts/packages -p:PackageVersion=0.0.${{ github.run_number }}

      - name: Upload package artifacts (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
