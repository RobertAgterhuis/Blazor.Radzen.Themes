name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Build (Release)
        run: dotnet build Agterhuis.Ui.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test Agterhuis.Ui.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack src/Agterhuis.Ui/Agterhuis.Ui.csproj -c Release --no-build -o artifacts/packages -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v v="$VERSION" '
            BEGIN { capture=0 }
            /^## \[/ {
              if (capture==1) exit
              if ($0 ~ "^## \\[" v "\\]") { capture=1; next }
            }
            capture==1 { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No matching changelog section found for $VERSION." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          generate_release_notes: true

      - name: Publish to nuget.org (optional)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "artifacts/packages/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          else
            echo "NUGET_API_KEY is not configured. Skipping nuget.org publish."
          fi
